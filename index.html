<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Jolene Vong Digital Namecard</title>

  <!-- BEBAS NEUE -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      width:100%;
      overflow-x:hidden;
      background:#ececec;
      font-family:"Century Gothic", sans-serif;
    }
    

    /* =========================
       MOBILE ONLY LAYOUT
    ========================== */

    .mobile-container{
      width:100%;
      max-width:480px;
      margin:auto;
      background:#ececec;
      min-height:100vh;
      position:relative;
    }

    /* =========================
   HERO SECTION
========================= */

.hero{
    position:relative;
    width:100%;
    height:100vh;
    min-height:700px;
    overflow:hidden;
}

/* BACKGROUND IMAGE */

.bg-image{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    z-index:0;
}

/* DARK OVERLAY */

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.15);
    z-index:1;
}

/* NAME */

.name{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    z-index:3;
    color:white;
    font-family:'Bebas Neue', sans-serif;

}

.big{
    display:block;
    font-size:clamp(85px, 20vw, 180px);
    line-height:0.85;
    animation:fadeIn 1.5s ease;
  
}

.designation{
    display:block;
    margin-top:5px;
    font-size:clamp(25px, 9vw, 36px);
    line-height:1;
    animation:fadeIn 1.5s ease;
}

/* PERSON */

.person{
    position:absolute;
    bottom:0px;
    left:50%;
    transform:translateX(-50%);
    width:380px;
    max-width:90%;
    z-index:2;
    animation:fadeIn 1.5s ease;
}

.person img{
    display:block;
    width:100%;
    height:auto;
}

    /* =========================
       CONTACT SECTION
    ========================== */

    .contact-section{
      width:100%;
      background:#ececec;
      padding:40px 22px 60px;
    }

    .contact-btn{
      width:100%;
      height:78px;
      background:#f00000;
      border-radius:50px;
      margin-bottom:28px;

      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;

      text-decoration:none;
      color:black;

      font-size:22px;
      font-weight:bold;

      box-shadow:0 6px 15px rgba(0,0,0,0.15);

      transition:0.3s;
    }

    .contact-btn:active{
      transform:scale(0.97);
    }

    /* SOCIAL BUTTONS */

    .social-row{
      display:flex;
      gap:18px;
      margin-bottom:45px;
    }

    .social-btn{
      flex:1;
      height:72px;

      background:#f00000;
      border-radius:50px;

      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;

      text-decoration:none;
      color:black;

      font-size:18px;
      font-weight:bold;

      box-shadow:0 6px 15px rgba(0,0,0,0.15);

      transition:0.3s;
    }

    .social-btn:active{
      transform:scale(0.97);
    }

    /* COMPANY */

    .company{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:15px;
    }

    .company img{
      width:75px;
      height:auto;
    }

    .company h2{
      font-family:'Bebas Neue', sans-serif;
      font-size:30px;
      line-height:0.9;
      color:black;
      letter-spacing:1px;
    }

    /* =========================
       ANIMATIONS
    ========================== */

    @keyframes slideLeft{
      from{
        opacity:0;
        transform:translateX(-80px);
      }
      to{
        opacity:1;
        transform:translateX(0);
      }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(50px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

  </style>
</head>

<body>

  <!-- MOBILE CONTAINER -->

  <div class="mobile-container">

    <!-- HERO -->

    <section class="hero">

    <!-- Background -->
    <img class="bg-image" src="background.jpg" alt="Background">

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Name -->
    <div class="name">
        <span class="big">JOLENE VONG</span>
        <span class="designation">
            FINANCIAL SERVICE PROVIDER
        </span>
    </div>

    <!-- Person -->
    <div class="person">
        <img src="jolene.png" alt="Jolene Vong">
    </div>

</section>

    <!-- CONTACT -->

    <section class="contact-section">

      <a href="tel:+60128871223" class="contact-btn">
        <i class="fa-solid fa-phone"></i>
        CALL
      </a>

      <a href="https://wa.me/60128871223" class="contact-btn">
        <i class="fa-brands fa-whatsapp"></i>
        WHATSAPP
      </a>

      <a href="mailto:jolenevong89@gmail.com" class="contact-btn">
        <i class="fa-solid fa-envelope"></i>
        EMAIL
      </a>

      <!-- SOCIAL -->

      <div class="social-row">

     <a href="https://www.facebook.com/jolene.vong/" class="social-btn">
          <i class="fa-brands fa-facebook"></i>
          FACEBOOK
        </a>

        <a href="https://instagram.com/jolenevong" class="social-btn">
          <i class="fa-brands fa-instagram"></i>
          INSTAGRAM
        </a>

      </div>

      <!-- COMPANY -->

<div class="company">

  <img src="logo.png" alt="Journey Life Assurance">

  <div class="company-text">

    <h2>
      JOURNEY LIFE ASSURANCE
    </h2>

    <p class="small-company-name">
      Prudential Assurance Malaysia Berhad
    </p>

  </div>

</div>

</body>
</html>
